name: Keep API Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "Missing API_BASE_URL repository secret"
            exit 1
          fi

          API_BASE_URL="${API_BASE_URL%/}"
          if [[ "$API_BASE_URL" == */api ]]; then
            HEALTH_URL="$API_BASE_URL/health"
          else
            HEALTH_URL="$API_BASE_URL/api/health"
          fi

          echo "Pinging $HEALTH_URL"
          curl --fail --silent --show-error --location \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 20 \
            --connect-timeout 15 \
            --max-time 60 \
            "$HEALTH_URL"
